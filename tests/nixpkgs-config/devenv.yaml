inputs:
  devenv:
    url: path:../../?dir=src/modules

# Top-level deprecated form: covered by platform layer below.
allow_unfree: false
allow_unsupported_system: false

nixpkgs:
  # Base nixpkgs layer — appended-to by per_platform below.
  cuda_support: false
  cuda_capabilities: [ "7.5" ]

  per_platform:
    i386-linux:
      allow_unfree: true
      allow_unsupported_system: true
      cuda_support: true
      cuda_capabilities: [ "8.0" ]
    x86_64-linux:
      allow_unfree: true
      allow_unsupported_system: true
      cuda_support: true
      cuda_capabilities: [ "8.0" ]
    aarch64-linux:
      allow_unfree: true
      allow_unsupported_system: true
      cuda_support: true
      cuda_capabilities: [ "8.0" ]
    aarch64-darwin:
      allow_unfree: true
      allow_unsupported_system: true
      cuda_support: true
      cuda_capabilities: [ "8.0" ]
    x86_64-darmin:
      allow_unfree: true
      allow_unsupported_system: true
      cuda_support: true
      cuda_capabilities: [ "8.0" ]
