inputs:
  devenv:
    url: path:../../?dir=src/modules

# This values are overridden in the platform-specific config below on purpose
allow_unfree: false
allow_unsupported_system: false

nixpkgs:
  # These values are overridden in the platform-specific config below on purpose
  cuda_support: false
  cuda_capabilities: []

  per_platform:
    i386-linux:
      allow_unfree: true
      allow_unsupported_system: true
      cuda_support: true
      cuda_capabilities: [ "8.0" ]
    x86_64-linux:
      allow_unfree: true
      allow_unsupported_system: true
      cuda_support: true
      cuda_capabilities: [ "8.0" ]
    aarch64-linux:
      allow_unfree: true
      allow_unsupported_system: true
      cuda_support: true
      cuda_capabilities: [ "8.0" ]
    aarch64-darwin:
      allow_unfree: true
      allow_unsupported_system: true
      cuda_support: true
      cuda_capabilities: [ "8.0" ]
    x86_64-darmin:
      allow_unfree: true
      allow_unsupported_system: true
      cuda_support: true
      cuda_capabilities: [ "8.0" ]
