# yaml-language-server: $schema=./docs/src/devenv.schema.json
inputs:
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling

  # Use the local development modules
  devenv:
    url: .?dir=src/modules

  nix:
    url: github:cachix/nix/devenv-2.32

  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs

  pre-commit-hooks:
    follows: git-hooks

  rust-overlay:
    url: github:oxalica/rust-overlay
    inputs:
      nixpkgs:
        follows: nixpkgs

  crate2nix:
    # https://github.com/nix-community/crate2nix/issues/439
    url: github:rossng/crate2nix/ba5dd398e31ee422fbe021767eb83b0650303a6e

  devenv-claude-agents:
    url: github:cachix/devenv-claude-agents
    flake: false

# Import devenv projects
imports:
  - devenv-claude-agents
  - ./docs
  - ./devenv-nix-backend
